name: Build and push OpenClaw image (extras)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream release tag to publish (default: latest upstream tag)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve upstream tag
        id: upstream
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/openclaw/openclaw/tags?per_page=1" | \
              jq -r '.[0].name')"
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Missing tag. Provide a workflow_dispatch input or ensure the upstream API is reachable."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out upstream repository
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: refs/tags/${{ steps.upstream.outputs.tag }}
          fetch-depth: 1

      - name: Resolve upstream commit sha
        id: vars
        shell: bash
        run: |
          SHA="$(git rev-parse --short HEAD)"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image from upstream Dockerfile
        shell: bash
        run: |
          docker buildx build \
            -f Dockerfile \
            --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1 \
            --build-arg OPENCLAW_DOCKER_APT_PACKAGES="python3 python3-pip" \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=gha,scope=openclaw-base \
            --cache-to type=gha,scope=openclaw-base,mode=max \
            -t ghcr.io/${{ github.repository }}-openclaw-base:sha-${{ steps.vars.outputs.sha }} \
            --push \
            .

      - name: Build and push image with extras
        shell: bash
        run: |
          cat > Dockerfile.openclaw-extras <<'EOF'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          USER root
          RUN npm i -g opencode-ai@latest
          USER node
          WORKDIR /app
          RUN openclaw plugins install @wecom/wecom-openclaw-plugin
          USER root
          EOF
          IMAGE="ghcr.io/${{ github.repository }}-openclaw:${{ steps.upstream.outputs.tag }}"
          docker buildx build \
            -f Dockerfile.openclaw-extras \
            --build-arg BASE_IMAGE=ghcr.io/${{ github.repository }}-openclaw-base:sha-${{ steps.vars.outputs.sha }} \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=gha,scope=openclaw-extras \
            --cache-to type=gha,scope=openclaw-extras,mode=max \
            -t "$IMAGE" \
            -t "ghcr.io/${{ github.repository }}-openclaw:sha-${{ steps.vars.outputs.sha }}" \
            --push \
            .
